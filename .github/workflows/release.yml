name: Release

# Fires when a version tag is pushed — including the tag GitHub creates
# when you make a new release in the web UI. goreleaser then builds the
# binaries (linux/darwin amd64+arm64, windows amd64) and attaches them to
# the release, keeping any notes you wrote by hand.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
