name: Release

# Two triggers so both flows work:
#  - pushing a tag with git (`git tag v1.2.3 && git push origin v1.2.3`)
#  - creating a release in the GitHub UI / via `gh release create`
#    (API-created tags do not reliably fire push events, so the release
#    event is required for this path)
# goreleaser builds the binaries (linux/darwin amd64+arm64, windows
# amd64) and attaches them, keeping hand-written release notes
# (release.mode: keep-existing). The concurrency group prevents duplicate
# runs when both events fire for the same tag.
on:
  push:
    tags: ["v*"]
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
