name: Release

# Fires when a release is published — via the GitHub web UI or
# `gh release create`. goreleaser builds the binaries (linux/darwin
# amd64+arm64, windows amd64) and attaches them to that release, keeping
# hand-written notes (release.mode: keep-existing).
#
# Deliberately NOT triggered on tag pushes: API-created tags fire push
# events inconsistently, and when both events fire the second goreleaser
# run fails on duplicate assets. One flow, one trigger.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
